<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — Бухгалтер PRO</title>
<link rel="preconnect" href="https://yastatic.net" crossorigin>
<style>
@font-face { font-family: 'YS Text'; src: url('https://yastatic.net/s3/home/fonts/ys/4/text-regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'YS Text'; src: url('https://yastatic.net/s3/home/fonts/ys/4/text-medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
@font-face { font-family: 'YS Text'; src: url('https://yastatic.net/s3/home/fonts/ys/4/text-bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'YS Display Cond'; src: url('https://yastatic.net/s3/home/fonts/ys/4/display-cond-bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'YS Display Cond'; src: url('https://yastatic.net/s3/home/fonts/ys/4/display-cond-black.woff2') format('woff2'); font-weight: 900; font-display: swap; }
</style>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="container header-inner">
    <a href="index.html" class="logo">📚 Бухгалтер <span>PRO</span></a>
    <nav class="nav">
      <a href="login.html">Войти</a>
    </nav>
  </div>
</header>

<section class="auth-section">
  <div class="auth-box">
    <h2>Регистрация</h2>
    <p class="sub">Создайте аккаунт и присоединяйтесь к Ане 🎓</p>
    <div class="error" id="reg-error"></div>
    <form onsubmit="register(event)">
      <input type="text" id="reg-name" placeholder="Как к вам обращаться?" required>
      <input type="email" id="reg-email" placeholder="Email" required>
      <select id="reg-role" required>
        <option value="">Ваша должность</option>
        <option value="Бухгалтер">Бухгалтер</option>
        <option value="Главный бухгалтер">Главный бухгалтер</option>
        <option value="Финансовый директор">Финансовый директор</option>
        <option value="HR">HR-специалист</option>
        <option value="Тревел-менеджер">Тревел-менеджер</option>
        <option value="Руководитель">Руководитель / Собственник</option>
        <option value="Другое">Другое</option>
      </select>
      <input type="password" id="reg-password" placeholder="Пароль (минимум 6 символов)" required minlength="6">
      <button type="submit" class="btn full-width">Создать аккаунт</button>
    </form>
    <div class="auth-switch">
      Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
  </div>
</section>

<script src="js/auth.js"></script>
</body>
</html>
